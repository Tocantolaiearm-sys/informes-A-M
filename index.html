  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script>
const { useState, useRef, useCallback, useEffect } = React;
const T = {
    bg: "#070D1A", bgCard: "#0D1629", bgPanel: "#111E35",
    border: "rgba(99,132,199,0.18)", borderHi: "rgba(99,132,199,0.35)",
    accent: "#4F9EFF", accentGlow: "rgba(79,158,255,0.25)",

    white: "#F0F4FF", muted: "#5A6E99", dimtxt: "#8BA0CC",

const money = (n) => new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP", maximumFractionDigits: 0 })
    .format(n !== null && n !== void 0 ? n : 0).replace("COP", "").trim();
const moneyFull = (n) => new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP", minimumFractionDigits: 2 })
    .format(n !== null && n !== void 0 ? n : 0).replace("COP", "$").trim();
const pct = (a, b) => b !== 0 ? ((a / b) * 100).toFixed(1) : "0.0";
const ABS = Math.abs;
function loadXLSX() {
    return new Promise((res, rej) => {
        if (window.XLSX) {
            res(window.XLSX);
            return;
        }
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        s.onload = () => res(window.XLSX);

}
function parseNum(v) {

    if (typeof v === "number")
        return isNaN(v) ? 0 : v;
    const s = String(v).replace(/\s/g, "").replace(/\./g, "").replace(/,/g, ".");

}

}
function getTipo(cod, deb, cred) {
    const f = String(cod).replace(/\D/g, "").charAt(0);
    if (f === "1")
        return "ACTIVO";
    if (f === "2")
        return "PASIVO";
    if (f === "3")
        return "PATRIMONIO";
    if (f === "4")
        return (deb > 0 && cred === 0) ? "DEVOLUCION" : "INGRESO";
    if (f === "5")
        return "GASTO";
    if (f === "6")
        return "COSTO";
    if (f === "7")
        return "COSTO";

}
function getCell(ws, XLSX, c, r) {

    if (!cel)
        return "";

}
async function processExcel(file) {

            valor = debito; // movimiento período
        else if (tipo === "GASTO")
            valor = debito; // movimiento período

            valor = debito; // movimiento período

            continue;
