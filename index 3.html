  <script>

    border: "rgba(99,132,199,0.18)", borderHi: "rgba(99,132,199,0.35)",

    .format(n !== null && n !== void 0 ? n : 0).replace("COP", "").trim();

    .format(n !== null && n !== void 0 ? n : 0).replace("COP", "$").trim();
const pct = (a, b) => b !== 0 ? ((a / b) * 100).toFixed(1) : "0.0";
const ABS = Math.abs;
function loadXLSX() {
    return new Promise((res, rej) => {
        if (window.XLSX) {
            res(window.XLSX);
            return;

        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";

function parseNum(v) {

}
function normStr(s) {

}
function getTipo(cod, deb, cred) {
    const digits = String(cod).replace(/\D/g, "");
    const f = digits.charAt(0);
    if (f === "1")
        return "ACTIVO";
    if (f === "2")
        return "PASIVO";
    if (f === "3")
        return "PATRIMONIO";
    if (f === "4") {
        // Grupo 4175 = Devoluciones en ventas (PUC colombiano)
        // Siempre es DEVOLUCION independientemente del movimiento del período
        if (digits.startsWith("4175"))
            return "DEVOLUCION";
        return (deb > 0 && cred === 0) ? "DEVOLUCION" : "INGRESO";
    }
    if (f === "5")
        return "GASTO";
    if (f === "6")
        return "COSTO";

            continue;

        if (digits.length !== 8)
            continue;

        const credito = parseNum(cel(COL_CRED, r));

            continue;

        if (tipo === "INGRESO")
            valor = credito; // movimiento período
        else if (tipo === "DEVOLUCION")
            valor = debito; // movimiento período
        else if (tipo === "GASTO")
            valor = debito; // movimiento período
        else if (tipo === "COSTO")
            valor = debito; // movimiento período

            valor = saldoFinal; // posición al cierre (balance)

            codigo: codigoRaw, nombre: nombreRaw, tipo,

        const nombreRaw = String(cel(COL_NOM, r) || "").trim();
        if (!codigoRaw || !nombreRaw)
            continue;

        empresa: empresa || "Empresa", nit: nit || "—", periodo: periodo || "Período analizado",
        cuentas, ind,
        resumen: { totalIngresos, totalDevoluciones, totalCostoVentas, totalGastos,
            totalActivos, totalPasivos, totalPatrimonio,
            utilidadBruta, utilidadNeta, margenBruto, margenNeto,
            ingresosNetos, utilidadOperacional, gastosFinancieros },

}

            try {
                const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" });

            catch (err) {
                rej(new Error("Error leyendo balance por terceros: " + err.message));

        if (!cell)
            return "";

    }

        let dIdx = -1, cIdx = -1, terIdx = -1;
        for (let c = 0; c < nCols; c++) {
            const v = normStr(String(celT(c, r)));
            if (v.includes("debito"))
                dIdx = c;
            if (v.includes("credito"))
                cIdx = c;
            if (v.includes("tercero"))
                terIdx = c;
        }
        if (dIdx >= 0 && cIdx >= 0 && terIdx >= 0) {
            headerRow = r;
            COL_DEB = dIdx;
            COL_CRED = cIdx;
            COL_TER = terIdx;
            for (let c = 0; c < nCols; c++) {
                const v = normStr(String(celT(c, r)));
                if (v.includes("codigo"))
                    COL_COD = c;
                if (v.includes("nombre") && !v.includes("tercero"))
                    COL_NOM = c;

        }

    for (let r = headerRow + 1; r < nRows; r++) {
        const nivel = String(celT(0, r) || "").trim();
        if (nivel !== "Auxiliar")
            continue;
        const codigoRaw = String(celT(COL_COD, r) || "").trim();
        const nombreRaw = String(celT(COL_NOM, r) || "").trim();

            continue;
        const digits = codigoRaw.replace(/\D/g, "");

        const credito = parseNum(celT(COL_CRED, r));

            continue;
        let valor;

            valor = debito;
        else if (tipo === "GASTO")
            valor = debito;
